# Release Workflow - Builds and pushes Docker images, creates GitHub releases

name: Release

on:
  push:
    tags:
      - 'v*'

  # Manual trigger only (for testing the workflow)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build but do not push)'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: nstalgic/nekzus

jobs:
  # Run tests before building release
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          go mod download
          cd web && npm ci

      - name: Build web UI
        working-directory: web
        run: npm run build

      - name: Copy web dist for embedding
        run: cp -r web/dist cmd/nekzus/webdist

      - name: Run tests
        run: go test -short -race ./...

  # Build and push multi-architecture Docker images
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Exact version: 1.2.3 (always)
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            # Minor floating: 1.2 (stable only)
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }},enable=${{ !contains(steps.version.outputs.version, '-') }}
            # Major floating: 1 (stable only)
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }},enable=${{ !contains(steps.version.outputs.version, '-') }}
            # latest (stable only)
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.version, '-') }}
            # beta channel (pre-releases only)
            type=raw,value=beta,enable=${{ contains(steps.version.outputs.version, '-') }}
            # Commit SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" ${LAST_TAG}..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" -20)
          fi

          # Create release notes
          cat << EOF > release_notes.md
          ## What's Changed

          ${COMMITS}

          ## Docker

          \`\`\`bash
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          \`\`\`

          ## Quick Start

          \`\`\`bash
          docker run -d \\
            --name nekzus \\
            -p 8080:8080 \\
            -v /var/run/docker.sock:/var/run/docker.sock:ro \\
            -v nekzus-data:/app/data \\
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          \`\`\`

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ steps.version.outputs.version }}
          EOF

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && github.event_name == 'push' }}
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
